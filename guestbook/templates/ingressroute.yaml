{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.appName }}-ingressroute
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint }}
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        {{- if .Values.canary.enabled }}
        - name: guestbook-weighted
          kind: TraefikService
        {{- else }}
        - name: {{ .Values.appName }}-frontend
          port: {{ .Values.frontend.port }}
        {{- end }}
{{- end }}