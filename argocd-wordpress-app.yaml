apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chrish1979/k8s.git
    targetRevision: HEAD
    path: wordpress-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
  ignoreDifferences:
    - group: serving.knative.dev
      kind: Service
      managedFieldsManagers:
        - knative-serving
